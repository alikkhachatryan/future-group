services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: task-manager-api
        restart: unless-stopped
        ports:
            - "8000:8000"
        environment:
            APP_KEY: ${APP_KEY}
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: http://localhost:8000

            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: future_group
            DB_USERNAME: future_group
            DB_PASSWORD: secret
        depends_on:
            db:
                condition: service_healthy

    db:
        image: mysql:8.4
        container_name: task-manager-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: future_group
            MYSQL_USER: future_group
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    mysql_data:
